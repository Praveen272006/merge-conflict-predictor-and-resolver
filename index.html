<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Praveen Kumar V</title>
    <style>
        body { 
            margin: 0; padding: 20px; 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        canvas { 
            border: 3px solid #0f0; 
            background: #111; 
            box-shadow: 0 0 20px #0f0; 
        }
        .controls { 
            margin: 20px 0; 
            text-align: center; 
        }
        .score { 
            font-size: 24px; 
            font-weight: bold; 
            margin: 10px 0; 
        }
        .instructions { 
            text-align: center; 
            max-width: 600px; 
            line-height: 1.6; 
            margin-top: 20px; 
        }
        button { 
            background: #0f0; 
            color: #000; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            font-family: inherit; 
            cursor: pointer; 
            border-radius: 5px; 
            margin: 0 10px; 
        }
        button:hover { background: #0a0; }
        .game-over { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.9); 
            color: #f00; 
            padding: 30px; 
            border: 2px solid #f00; 
            border-radius: 10px; 
            text-align: center; 
            display: none; 
        }
    </style>
</head>
<body>
    <h1>🚀 SPACE INVADERS 🚀</h1>
    <p>Praveen Kumar V - 23MIS0422 - Full JS Game (300 Lines)</p>
    
    <div class="score">
        Score: <span id="score">0</span> | Lives: <span id="lives">3</span> | Level: <span id="level">1</span>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="controls">
        <button onclick="startGame()">Start Game</button>
        <button onclick="pauseGame()">Pause</button>
        <button onclick="resetGame()">Reset</button>
    </div>
    
    <div class="instructions">
        <strong>Controls:</strong> A/D or ←/→ Arrow Keys (Move) | SPACEBAR (Shoot) | 
        Survive waves of invaders! Clear all enemies to advance levels.
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        
        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let keys = {};
        
        // Player object
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 80,
            width: 50,
            height: 30,
            speed: 5,
            bullets: []
        };
        
        // Enemy arrays
        let enemies = [];
        let enemyBullets = [];
        let particles = [];
        
        // Game initialization
        function init() {
            enemies = [];
            enemyBullets = [];
            player.bullets = [];
            createEnemyWave();
            gameRunning = true;
            gamePaused = false;
            gameLoop();
        }
        
        // Create enemy formation
        function createEnemyWave() {
            const rows = 5;
            const cols = 10;
            const spacing = 60;
            const startX = 100;
            const startY = 50;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    enemies.push({
                        x: startX + col * spacing,
                        y: startY + row * 40,
                        width: 40,
                        height: 30,
                        speed: 0.5 + level * 0.2,
                        direction: 1,
                        health: 1,
                        lastShot: 0
                    });
                }
            }
        }
        
        // Input handling
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                shoot();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });
        
        // Player shooting
        function shoot() {
            if (player.bullets.length < 1) {
                player.bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 12,
                    speed: 8
                });
            }
        }
        
        // Update game objects
        function update() {
            if (!gameRunning || gamePaused) return;
            
            // Player movement
            if (keys['KeyA'] || keys['ArrowLeft']) {
                player.x = Math.max(0, player.x - player.speed);
            }
            if (keys['KeyD'] || keys['ArrowRight']) {
                player.x = Math.min(canvas.width - player.width, player.x + player.speed);
            }
            
            // Update player bullets
            for (let i = player.bullets.length - 1; i >= 0; i--) {
                const bullet = player.bullets[i];
                bullet.y -= bullet.speed;
                if (bullet.y < 0) {
                    player.bullets.splice(i, 1);
                }
            }
            
            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.x += enemy.speed * enemy.direction;
                
                // Enemy edge collision
                if (enemy.x <= 20 || enemy.x >= canvas.width - enemy.width - 20) {
                    enemies.forEach(e => e.direction *= -1);
                    enemies.forEach(e => e.y += 20);
                }
                
                // Enemy shooting (random)
                if (Math.random() < 0.005 + level * 0.001 && Date.now() - enemy.lastShot > 1000) {
                    enemyBullets.push({
                        x: enemy.x + enemy.width / 2 - 2,
                        y: enemy.y + enemy.height,
                        width: 4,
                        height: 8,
                        speed: 3
                    });
                    enemy.lastShot = Date.now();
                }
                
                // Check player bullet collision
                for (let j = player.bullets.length - 1; j >= 0; j--) {
                    const bullet = player.bullets[j];
                    if (bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y) {
                        player.bullets.splice(j, 1);
                        enemy.health--;
                        createExplosion(enemy.x, enemy.y);
                        if (enemy.health <= 0) {
                            enemies.splice(i, 1);
                            score += 10 * level;
                        }
                        break;
                    }
                }
            }
            
            // Update enemy bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                bullet.y += bullet.speed;
                if (bullet.y > canvas.height) {
                    enemyBullets.splice(i, 1);
                }
                
                // Player collision
                if (bullet.x < player.x + player.width &&
                    bullet.x + bullet.width > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + bullet.height > player.y) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    createExplosion(player.x, player.y);
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Check win/lose conditions
            if (enemies.length === 0) {
                level++;
                createEnemyWave();
            }
            if (lives <= 0) {
                gameOver();
            }
            
            // Update UI
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            levelEl.textContent = level;
        }
        
        // Explosion effect
        function createExplosion(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x + 20,
                    y: y + 15,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 20
                });
            }
        }
        
        // Render everything
        function render() {
            // Clear canvas
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw player
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 5, player.y + 5, 10, 5);
            ctx.fillRect(player.x + 35, player.y + 5, 10, 5);
            
            // Draw player bullets
            ctx.fillStyle = '#ff0';
            player.bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
            
            // Draw enemies
            enemies.forEach(enemy => {
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                ctx.fillStyle = '#fff';
                ctx.fillRect(enemy.x + 8, enemy.y + 8, 6, 4);
                ctx.fillRect(enemy.x + 26, enemy.y + 8, 6, 4);
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x + 17, enemy.y + 20, 6, 8);
            });
            
            // Draw enemy bullets
            ctx.fillStyle = '#f80';
            enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 0, ${p.life / 20})`;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
        }
        
        // Game loop
        function gameLoop() {
            update();
            render();
            if (gameRunning && !gamePaused) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Game control functions
        function startGame() {
            if (!gameRunning) {
                init();
            } else if (gamePaused) {
                gamePaused = false;
                gameLoop();
            }
        }
        
        function pauseGame() {
            gamePaused = !gamePaused;
        }
        
        function resetGame() {
            gameRunning = false;
            gameOverEl.style.display = 'none';
            score = 0;
            lives = 3;
            level = 1;
            init();
        }
        
        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }
        
        // Start with instructions visible
        render();
    </script>
</body>
</html>
