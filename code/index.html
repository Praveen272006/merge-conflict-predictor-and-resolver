<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Weather Dashboard - Praveen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">IoT Weather</div>
        <button id="darkToggle"><i class="fas fa-moon"></i></button>
    </nav>
    <main class="container">
        <section class="search">
            <input type="text" id="cityInput" placeholder="Enter city (e.g., Madurai)">
            <button id="searchBtn"><i class="fas fa-search"></i> Get Weather</button>
        </section>
        <section id="currentWeather" class="current-weather hidden">
            <div class="city-info">
                <h2 id="cityName">-</h2>
                <p id="dateTime">-</p>
            </div>
            <div class="temp-info">
                <img id="weatherIcon" src="" alt="Weather">
                <p id="temperature" class="temp">-</p>
                <p id="description">-</p>
            </div>
            <div class="metrics">
                <div class="metric">
                    <i class="fas fa-tint"></i>
                    <span id="humidity">-</span>
                </div>
                <div class="metric">
                    <i class="fas fa-wind"></i>
                    <span id="windSpeed">-</span>
                </div>
                <div class="metric">
                    <i class="fas fa-eye"></i>
                    <span id="visibility">-</span>
                </div>
            </div>
        </section>
        <section id="forecast" class="forecast hidden">
            <h3>Hourly Forecast</h3>
            <div id="hourlyList" class="hourly-grid"></div>
        </section>
        <section class="gauges">
            <h3>IoT Gauges (Simulated)</h3>
            <canvas id="tempGauge" width="200" height="200"></canvas>
            <canvas id="humidGauge" width="200" height="200"></canvas>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
